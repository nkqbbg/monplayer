name: Update Channels JSON

on:
  schedule:
    # chạy mỗi 40 phút nhưng bắt đầu từ phút lẻ
    - cron: "7,47 * * * *"
  workflow_dispatch:

concurrency:
  group: scrape-channels
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Check allowed time (VN)
        id: timecheck
        run: |
          HOUR=$(TZ='Asia/Ho_Chi_Minh' date +%H)

          if [ "$HOUR" -ge 2 ] && [ "$HOUR" -lt 11 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.timecheck.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.timecheck.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.timecheck.outputs.skip != 'true'
        run: npm ci

      - name: Run scraper
        if: steps.timecheck.outputs.skip != 'true'
        run: node fetch-channel.js
        env:
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Commit changes
        if: steps.timecheck.outputs.skip != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add channels.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto-update channels list [skip ci]"

          git pull --rebase --autostash
          git push
